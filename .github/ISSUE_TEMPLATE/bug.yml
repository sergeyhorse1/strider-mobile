name: Bug report
description: Report a bug
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, browser/runtime, version"